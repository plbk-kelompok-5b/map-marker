<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>
    <div id="controls">
      <select id="contributor-input">
        <option value="">Pilih Contributor</option>
        <option value="Faruqi">Faruqi</option>
        <option value="Faris">Faris</option>
        <option value="Nazlul">Nazlul</option>
      </select>
      <input type="text" id="label-input" placeholder="Nama lokasi" />
      <button id="add-btn">Tambah Pin</button>
    </div>
    <div id="legend" class="legend">
      <h4>Contributor Legend</h4>
      <ul id="legend-list"></ul>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./map.js"></script>
  </body>
</html>
